<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KYLDISH</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Hero Section */

        .hero {
            height: 100vh;
            background:
                linear-gradient(rgba(0, 0, 0, .45), rgba(0, 0, 0, .6)),
                url("image.PNG");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Optional blur layer */

        .hero::after {

            content: "";

            position: absolute;
            inset: 0;

            backdrop-filter: blur(2px);
        }

        /* Center Content */

        .content {

            position: relative;
            z-index: 2;

            text-align: center;
            color: white;
        }

        .logo {

            font-size: 72px;
            letter-spacing: 6px;
            margin-bottom: 70px;
            font-weight: 700;

            text-shadow:
                0 0 20px #ff4de3,
                0 0 40px #ff4de3;
        }

        /* Navigation */

        nav {

            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        nav a {

            color: white;
            text-decoration: none;

            font-size: 20px;
            letter-spacing: 5px;
            transition: .35s;
            font-weight: 300;
        }

        nav a:hover {

            color: #ff4de3;
            transform: scale(1.05);
        }

        /* Social Icons */

        .social {

            position: absolute;

            bottom: 40px;

            left: 50%;
            transform: translateX(-50%);

            display: flex;
            gap: 30px;

            z-index: 3;
        }

        .social a {

            color: white;
            font-size: 26px;

            width: 55px;
            height: 55px;

            display: flex;
            align-items: center;
            justify-content: center;

            border: 2px solid rgba(255, 255, 255, .35);
            border-radius: 50%;

            transition: .3s;
        }

        .social a:hover {

            background: #ff4de3;
            border-color: #ff4de3;
            transform: translateY(-6px);
        }

        /* Mobile */

        @media(max-width:768px) {

            .logo {

                font-size: 46px;
            }

            nav a {

                font-size: 18px;
            }

        }
    </style>

</head>

<body>

    <section class="hero">

        <div class="content">

            <h1 class="logo">KYLDISH</h1>

            <nav>

                <a href="https://youtu.be/zbqx5GK1HF0?si=twZDQAgnicKTsaEl">LATEST VIDEOS</a>

                <a href="https://youtube.com/@kyldishfilms?si=fSxgOiU6fNyMEhLR">SHORT FILMS</a>

                <a href="https://www.youtube.com/playlist?list=PLFMCecO8qENw">REVIEWS</a>

                <a href="#">SHOP</a>

                <a href="mailto:kyldishofficial@gmail.com">CONTACT</a>

            </nav>

        </div>

        <div class="social">

            <a href="https://www.youtube.com/@Kyldish"><i class="fab fa-youtube"></i></a>

            <a href="https://www.instagram.com/kyldishofficial/"><i class="fab fa-instagram"></i></a>

            <a href="https://x.com/kyldishofficial?s=11&t=hT3JwYWfIjIePovdhWtC_g"><i class="fab fa-x-twitter"></i></a>

            <a href="https://www.tiktok.com/@kyldishofficial"><i class="fab fa-tiktok"></i></a>

        </div>

    </section>

</body>

</html>
